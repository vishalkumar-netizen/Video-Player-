<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ultra Pro Video Player</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.player-container {
  position: relative;
  width: 95%;
  max-width: 1000px;
  background: #111;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(255,0,0,0.4);
}

video {
  width: 100%;
  height: auto;
  background: black;
}

.controls {
  position: absolute;
  bottom: 0;
  width: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  padding: 10px;
  display: flex;
  align-items: center;
  gap: 10px;
}

button, select, input {
  background: rgba(255,255,255,0.1);
  color: white;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: rgba(255,0,0,0.8);
}

.progress {
  flex: 1;
}

input[type="range"] {
  width: 100%;
}

.file-upload {
  position: absolute;
  top: 10px;
  left: 10px;
  z-index: 10;
}

.subtitle-upload {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 10;
}

@media(max-width:600px){
  .controls{
    flex-wrap: wrap;
  }
}
</style>
</head>

<body>

<div class="player-container">

  <div class="file-upload">
    <input type="file" id="videoInput" accept="video/*">
  </div>

  <div class="subtitle-upload">
    <input type="file" id="subtitleInput" accept=".vtt">
  </div>

  <video id="video"></video>

  <div class="controls">
    <button id="playPause">▶</button>
    <div class="progress">
      <input type="range" id="seekBar" value="0" min="0" step="1">
    </div>
    <select id="speedControl">
      <option value="0.5">0.5x</option>
      <option value="1" selected>1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
    </select>
    <button id="fullscreen">⛶</button>
  </div>

</div>

<script>
const video = document.getElementById('video');
const playPause = document.getElementById('playPause');
const seekBar = document.getElementById('seekBar');
const speedControl = document.getElementById('speedControl');
const fullscreenBtn = document.getElementById('fullscreen');
const videoInput = document.getElementById('videoInput');
const subtitleInput = document.getElementById('subtitleInput');

videoInput.addEventListener('change', function() {
  const file = this.files[0];
  if(file) {
    video.src = URL.createObjectURL(file);
  }
});

playPause.addEventListener('click', () => {
  if(video.paused) {
    video.play();
    playPause.textContent = '⏸';
  } else {
    video.pause();
    playPause.textContent = '▶';
  }
});

video.addEventListener('timeupdate', () => {
  seekBar.max = video.duration;
  seekBar.value = video.currentTime;
});

seekBar.addEventListener('input', () => {
  video.currentTime = seekBar.value;
});

speedControl.addEventListener('change', () => {
  video.playbackRate = speedControl.value;
});

fullscreenBtn.addEventListener('click', () => {
  if(video.requestFullscreen) {
    video.requestFullscreen();
  }
});

subtitleInput.addEventListener('change', function(){
  const file = this.files[0];
  if(file){
    const track = document.createElement('track');
    track.kind = 'subtitles';
    track.label = 'Custom';
    track.srclang = 'en';
    track.src = URL.createObjectURL(file);
    track.default = true;
    video.appendChild(track);
  }
});

// Double tap seek (mobile)
let lastTap = 0;
video.addEventListener('touchend', function(e) {
  const currentTime = new Date().getTime();
  const tapLength = currentTime - lastTap;
  if (tapLength < 300 && tapLength > 0) {
    const x = e.changedTouches[0].clientX;
    if(x < window.innerWidth/2){
      video.currentTime -= 10;
    } else {
      video.currentTime += 10;
    }
  }
  lastTap = currentTime;
});
</script>

</body>
</html>
